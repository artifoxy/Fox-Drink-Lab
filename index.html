<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fox Drink Lab</title>
  <meta name="theme-color" content="#d68f6c" />
  <link rel="icon" href="icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png" />

  <style>
    :root{
      --bg1:#fffaf7;
      --bg2:#fff3ec;
      --bg3:#fdf7f2;
      --card:#ffffffcc;
      --text:#4f463f;
      --muted:#8a7d74;
      --line:#ead7cc;
      --line2:#f0dfd5;
      --accent:#d68f6c;
      --accent-soft:#f6e7de;
      --chip:#fff8f4;
      --chip2:#fff4ee;
      --tag:#f8ece6;
      --shadow:0 10px 30px rgba(214,166,138,.12);
      --shadow2:0 6px 18px rgba(214,166,138,.08);
      --radius:28px;
    }

    * { box-sizing: border-box; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"PingFang SC","Helvetica Neue",Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 48%,var(--bg3) 100%);
      min-height:100vh;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:24px;
    }
    .hero,.panel,.results{
      border:1px solid rgba(255,255,255,.7);
      background:var(--card);
      backdrop-filter: blur(10px);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
    }
    .hero{ padding:24px; margin-bottom:20px; }
    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      background:#f6d8ca;
      padding:6px 12px;
      font-size:12px;
      color:#685d56;
    }
    h1{
      margin:14px 0 8px;
      font-size:34px;
      line-height:1.1;
    }
    .sub{
      font-size:14px;
      color:var(--muted);
    }
    .panel{
      padding:22px;
      display:grid;
      gap:22px;
    }
    .field{
      display:grid;
      gap:10px;
    }
    .label{
      font-size:14px;
      font-weight:600;
      color:#6b5e56;
    }
    .helper{
      font-size:12px;
      color:var(--muted);
    }
    .chips,.saved-row,.active-tags,.actions,.feedback{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .chip,.saved-chip,.active-chip,.fb-btn,.btn{
      appearance:none;
      border:none;
      cursor:pointer;
      transition:.18s ease;
      font:inherit;
    }
    .chip,.saved-chip{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--chip);
      color:#6a5f58;
      font-size:14px;
    }
    .chip:hover,.saved-chip:hover,.btn.soft:hover,.btn.ghost:hover,.fb-btn:hover{
      transform:translateY(-1px);
    }
    .chip.active,.saved-chip.active,.fb-btn.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }
    .saved-wrap{
      display:grid;
      gap:8px;
    }
    .saved-title{
      font-size:12px;
      color:var(--muted);
    }
    .saved-item{
      display:inline-flex;
      align-items:center;
      gap:4px;
    }
    .remove-x{
      width:22px;
      height:22px;
      border:none;
      background:transparent;
      color:#a08f84;
      cursor:pointer;
      font-size:14px;
    }
    .active-chip{
      background:var(--tag);
      color:#6b5d56;
      padding:10px 14px;
      border-radius:999px;
      font-size:14px;
    }
    .tag-input{
      width:100%;
      border:1px solid var(--line);
      background:#fffdfa;
      padding:13px 14px;
      border-radius:14px;
      font-size:15px;
      outline:none;
    }
    .tag-input:focus,.select:focus{
      box-shadow:0 0 0 3px #f3d8ca;
    }
    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    .select{
      width:100%;
      border:1px solid var(--line);
      background:#fffdfa;
      color:#6b5d56;
      padding:13px 14px;
      border-radius:14px;
      font-size:15px;
      outline:none;
    }
    .btn{
      padding:12px 16px;
      border-radius:14px;
      font-size:14px;
    }
    .btn.primary{
      background:var(--accent);
      color:#fff;
      box-shadow:0 2px 8px rgba(214,143,108,.18);
    }
    .btn.soft{
      background:var(--accent-soft);
      color:#6b5d56;
      border:1px solid var(--line);
    }
    .btn.ghost{
      background:#fff8f4;
      color:#6b5d56;
      border:1px solid var(--line);
    }
    .status{
      font-size:13px;
      color:var(--muted);
      padding-top:2px;
    }
    .results{
      padding:22px;
      margin-top:20px;
    }
    .results h2{
      margin:0 0 12px;
      font-size:22px;
    }
    .cards{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:16px;
    }
    .card{
      border:1px solid var(--line2);
      background:linear-gradient(180deg,#fffdfc 0%,#fff7f2 100%);
      box-shadow:var(--shadow2);
      border-radius:22px;
      padding:16px;
      display:grid;
      gap:14px;
    }
    .card-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }
    .card-title{
      font-size:19px;
      font-weight:700;
      margin-bottom:4px;
    }
    .card-style{
      font-size:12px;
      color:var(--muted);
    }
    .cal{
      white-space:nowrap;
      font-size:12px;
      border:1px solid var(--line);
      background:#fff;
      color:#7a6d65;
      border-radius:999px;
      padding:6px 10px;
    }
    .section-title{
      font-size:14px;
      font-weight:700;
      margin-bottom:6px;
    }
    ul{
      margin:0;
      padding-left:18px;
      line-height:1.6;
      font-size:14px;
    }
    .steps{
      font-size:14px;
      line-height:1.7;
    }
    .fb-btn{
      padding:9px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#6d6058;
      font-size:12px;
    }

    @media (max-width: 900px){
      .cards{ grid-template-columns:1fr 1fr; }
    }
    @media (max-width: 720px){
      .wrap{ padding:16px; }
      .grid2{ grid-template-columns:1fr; }
      .cards{ grid-template-columns:1fr; }
      h1{ font-size:28px; }
      .actions{ flex-direction:column; align-items:stretch; }
      .actions .btn{ width:100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="badge">Creative drink generator</div>
      <h1>Fox Drink Lab</h1>
      <div class="sub">输入食材，点选感觉和设备，再生成 3–5 个配方。</div>
    </div>

    <div class="panel">
      <div class="field">
        <div class="label">我有什么（食材）</div>
        <div id="savedIngredientsWrap" class="saved-wrap" style="display:none;">
          <div class="saved-title">已保存食材，下次可直接点选</div>
          <div id="savedIngredients" class="saved-row"></div>
        </div>
        <div id="activeIngredients" class="active-tags"></div>
        <input id="ingredientInput" class="tag-input" placeholder="比如 espresso、matcha、raspberry、coconut milk（输入后按 Enter 录入）" />
        <div class="helper">输入完记得按 Enter，才会变成标签</div>
      </div>

      <div class="field">
        <div class="label">我想要的感觉</div>
        <div id="moodPresets" class="chips"></div>
        <div id="activeMoods" class="active-tags"></div>
        <input id="moodInput" class="tag-input" placeholder="可额外输入特殊需求，比如 像奶茶店但不腻（输入后按 Enter）" />
        <div class="helper">预设可直接点，自定义内容输入后按 Enter</div>
      </div>

      <div class="field">
        <div class="label">设备</div>
        <div id="toolPresets" class="chips"></div>
        <div id="activeTools" class="active-tags"></div>
        <input id="toolInput" class="tag-input" placeholder="可额外输入自己的设备（输入后按 Enter）" />
        <div class="helper">预设可直接点，自定义设备输入后按 Enter</div>
      </div>

      <div class="grid2">
        <div class="field">
          <div class="label">时间</div>
          <select id="timeSelect" class="select"></select>
        </div>
        <div class="field">
          <div class="label">温度</div>
          <select id="tempSelect" class="select"></select>
        </div>
      </div>

      <div class="field">
        <div class="actions">
          <button class="btn primary" id="generateBtn">Generate Recipes</button>
          <button class="btn ghost" id="moreBtn">Generate More</button>
          <button class="btn soft" id="creativeBtn">Be Creative</button>
        </div>
        <div class="status" id="statusText">未指定食材也可以生成 · 版本 0</div>
      </div>
    </div>

    <div class="results" id="resultsBlock" style="display:none;">
      <h2>Recipes</h2>
      <div id="cards" class="cards"></div>
    </div>
  </div>

  <script>
    const PRESET_MOODS = ["清爽", "低卡", "奶茶店", "甜品感", "花香", "果香", "拍照好看", "不太酸"];
    const PRESET_TOOLS = ["意式咖啡机", "Thermomix / 小美", "冷萃器具", "抹茶茶筅/抹茶碗", "搅拌机", "无设备"];
    const TIME_OPTIONS = ["", "早上", "下午", "晚上", "甜品"];
    const TEMP_OPTIONS = ["", "冷", "热", "都可以"];
    const CREATIVE_INGREDIENT_POOL = [
      "espresso","cold brew","matcha","green tea","black tea","pu'er","rose tea","osmanthus",
      "milk","oat milk","coconut milk","sparkling water","raspberry","blueberry","lychee","pear",
      "kumquat","honey","monk fruit","brown sugar","ice","collagen","chia seeds"
    ];

    const INGREDIENT_LIBRARY = {
      "espresso": { role:["base"], family:"coffee", weight:5, tags:["bitter","roasted","strong","caffeinated"], temp:["cold","hot"] },
      "cold brew": { role:["base"], family:"coffee", weight:5, tags:["smooth","roasted","cold","caffeinated"], temp:["cold"] },
      "matcha": { role:["base","accent"], family:"tea", weight:5, tags:["green","earthy","fresh","slightly-bitter","caffeinated"], temp:["cold","hot"] },
      "green tea": { role:["base"], family:"tea", weight:5, tags:["fresh","light","green","caffeinated"], temp:["cold","hot"] },
      "black tea": { role:["base"], family:"tea", weight:5, tags:["bold","tea","malty","caffeinated"], temp:["cold","hot"] },
      "pu'er": { role:["base"], family:"tea", weight:4, tags:["earthy","deep","tea","caffeinated"], temp:["cold","hot"] },
      "rose tea": { role:["base","accent"], family:"tea", weight:4, tags:["floral","soft","tea"], temp:["cold","hot"] },
      "osmanthus": { role:["accent","garnish"], family:"floral", weight:3, tags:["floral","apricot","soft","elegant"], temp:["cold","hot"] },
      "milk": { role:["body"], family:"dairy", weight:5, tags:["creamy","soft","rich","milky"], temp:["cold","hot"] },
      "oat milk": { role:["body"], family:"milk-alt", weight:5, tags:["creamy","grainy","soft","light-sweet"], temp:["cold","hot"] },
      "coconut milk": { role:["body"], family:"milk-alt", weight:4, tags:["creamy","tropical","sweet","light"], temp:["cold","hot"] },
      "sparkling water": { role:["base","body"], family:"water", weight:4, tags:["fresh","bubbly","light","clean"], temp:["cold"] },
      "raspberry": { role:["accent","garnish"], family:"fruit", weight:3, tags:["fruit","bright","acidic","berry"], temp:["cold"] },
      "blueberry": { role:["accent","garnish"], family:"fruit", weight:3, tags:["fruit","soft","berry","round"], temp:["cold"] },
      "lychee": { role:["accent","garnish"], family:"fruit", weight:4, tags:["fruit","sweet","soft","juicy","floral"], temp:["cold"] },
      "pear": { role:["accent","garnish"], family:"fruit", weight:4, tags:["fruit","soft","watery","light-sweet"], temp:["cold"] },
      "kumquat": { role:["accent","garnish"], family:"fruit", weight:2, tags:["fruit","citrus","bright","acidic"], temp:["cold","hot"] },
      "honey": { role:["sweetener","accent"], family:"sweetener", weight:4, tags:["sweet","round","warm"], temp:["cold","hot"] },
      "monk fruit": { role:["sweetener"], family:"sweetener", weight:4, tags:["sweet","low-cal"], temp:["cold","hot"] },
      "brown sugar": { role:["sweetener","accent"], family:"sweetener", weight:4, tags:["sweet","caramel","rich"], temp:["cold","hot"] },
      "ice": { role:["garnish","body"], family:"ice", weight:5, tags:["cold","refreshing","dilution"], temp:["cold"] },
      "collagen": { role:["accent"], family:"functional", weight:2, tags:["functional","neutral"], temp:["cold","hot"] },
      "chia seeds": { role:["garnish","accent"], family:"functional", weight:2, tags:["functional","texture"], temp:["cold"] }
    };

    const MOOD_RULES = {
      "清爽": { preferFamilies:["tea","water","fruit"], preferTags:["fresh","light","bubbly","watery"], avoidTags:["rich","deep"] },
      "低卡": { preferFamilies:["tea","water","fruit","sweetener"], preferTags:["low-cal","light","fresh"], avoidTags:["rich","caramel"] },
      "奶茶店": { preferFamilies:["tea","dairy","milk-alt","sweetener"], preferTags:["creamy","tea","round"] },
      "甜品感": { preferFamilies:["dairy","milk-alt","sweetener"], preferTags:["creamy","sweet","round","rich"] },
      "花香": { preferFamilies:["floral","tea","fruit"], preferTags:["floral","elegant","soft"] },
      "果香": { preferFamilies:["fruit","tea","water"], preferTags:["fruit","juicy","bright","berry"] },
      "拍照好看": { preferFamilies:["tea","fruit","milk-alt"], preferTags:["floral","berry","green","bubbly"] },
      "不太酸": { preferTags:["soft","round","sweet"], avoidTags:["acidic","citrus","bright"] }
    };

    const PAIRING_RULES = [
      { all:["coffee","acidic"], score:-3 },
      { all:["coffee","soft"], score:2 },
      { all:["tea","floral"], score:3 },
      { all:["creamy","floral"], score:1 },
      { all:["bubbly","creamy"], score:-2 },
      { all:["green","berry"], score:2 },
      { all:["roasted","caramel"], score:2 },
      { all:["citrus","dairy"], score:-3 },
      { all:["functional","soft"], score:1 }
    ];

    const STRUCTURE_PRESETS = {
      default: { base:1, body:1, accent:1, sweetener:1, garnish:1 },
      清爽: { base:1, body:1, accent:1, sweetener:0, garnish:1 },
      低卡: { base:1, body:1, accent:1, sweetener:0, garnish:1 },
      奶茶店: { base:1, body:1, accent:1, sweetener:1, garnish:0 },
      甜品感: { base:1, body:1, accent:1, sweetener:1, garnish:1 }
    };

    const store = {
      ingredients: [],
      moods: [],
      tools: [],
      time: "",
      temp: "",
      recipes: [],
      seed: 0,
      feedback: {},
      savedIngredients: []
    };

    const els = {
      ingredientInput: document.getElementById("ingredientInput"),
      moodInput: document.getElementById("moodInput"),
      toolInput: document.getElementById("toolInput"),
      activeIngredients: document.getElementById("activeIngredients"),
      activeMoods: document.getElementById("activeMoods"),
      activeTools: document.getElementById("activeTools"),
      savedIngredients: document.getElementById("savedIngredients"),
      savedIngredientsWrap: document.getElementById("savedIngredientsWrap"),
      moodPresets: document.getElementById("moodPresets"),
      toolPresets: document.getElementById("toolPresets"),
      timeSelect: document.getElementById("timeSelect"),
      tempSelect: document.getElementById("tempSelect"),
      generateBtn: document.getElementById("generateBtn"),
      moreBtn: document.getElementById("moreBtn"),
      creativeBtn: document.getElementById("creativeBtn"),
      statusText: document.getElementById("statusText"),
      resultsBlock: document.getElementById("resultsBlock"),
      cards: document.getElementById("cards")
    };

    function saveLocal() {
      localStorage.setItem("fox-drink-saved-ingredients", JSON.stringify(store.savedIngredients));
      localStorage.setItem("fox-drink-feedback", JSON.stringify(store.feedback));
    }

    function loadLocal() {
      try {
        const saved = JSON.parse(localStorage.getItem("fox-drink-saved-ingredients") || "[]");
        if (Array.isArray(saved)) store.savedIngredients = saved;
      } catch {}
      try {
        const fb = JSON.parse(localStorage.getItem("fox-drink-feedback") || "{}");
        if (fb && typeof fb === "object") store.feedback = fb;
      } catch {}
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function uniquePush(arr, value) {
      const v = String(value || "").trim();
      if (!v) return;
      if (!arr.includes(v)) arr.push(v);
    }

    function removeValue(arr, value) {
      const idx = arr.indexOf(value);
      if (idx > -1) arr.splice(idx, 1);
    }

    function renderPresetButtons(container, list, activeList) {
      container.innerHTML = "";
      list.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "chip" + (activeList.includes(item) ? " active" : "");
        btn.textContent = item;
        btn.type = "button";
        btn.onclick = () => {
          if (activeList.includes(item)) removeValue(activeList, item);
          else uniquePush(activeList, item);
          renderAll();
        };
        container.appendChild(btn);
      });
    }

    function renderActiveTags(container, list) {
      container.innerHTML = "";
      list.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "active-chip";
        btn.type = "button";
        btn.textContent = item + " ×";
        btn.onclick = () => {
          removeValue(list, item);
          renderAll();
        };
        container.appendChild(btn);
      });
    }

    function renderSavedIngredients() {
      if (!store.savedIngredients.length) {
        els.savedIngredientsWrap.style.display = "none";
        els.savedIngredients.innerHTML = "";
        return;
      }
      els.savedIngredientsWrap.style.display = "grid";
      els.savedIngredients.innerHTML = "";
      store.savedIngredients.forEach(item => {
        const wrap = document.createElement("div");
        wrap.className = "saved-item";

        const btn = document.createElement("button");
        btn.className = "saved-chip" + (store.ingredients.includes(item) ? " active" : "");
        btn.type = "button";
        btn.textContent = item;
        btn.onclick = () => {
          if (store.ingredients.includes(item)) removeValue(store.ingredients, item);
          else uniquePush(store.ingredients, item);
          renderAll();
        };

        const x = document.createElement("button");
        x.className = "remove-x";
        x.type = "button";
        x.textContent = "×";
        x.title = "从已保存里删除";
        x.onclick = () => {
          removeValue(store.savedIngredients, item);
          saveLocal();
          renderAll();
        };

        wrap.appendChild(btn);
        wrap.appendChild(x);
        els.savedIngredients.appendChild(wrap);
      });
    }

    function populateSelect(select, options) {
      select.innerHTML = "";
      options.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item;
        opt.textContent = item || "请选择";
        select.appendChild(opt);
      });
    }

    function randomPick(arr, min, max) {
      const shuffled = [...arr].sort(() => Math.random() - 0.5);
      const count = Math.max(min, Math.min(arr.length, Math.floor(Math.random() * (max - min + 1)) + min));
      return shuffled.slice(0, count);
    }

    function getIngredientProfile(name) {
      return INGREDIENT_LIBRARY[name] || {
        role:["accent"],
        family:"custom",
        weight:2,
        tags:["custom"],
        temp:["cold","hot"]
      };
    }

    function matchesTemp(profile, temp) {
      if (!temp || temp === "都可以") return true;
      return profile.temp.includes(temp === "热" ? "hot" : "cold");
    }

    function getActiveStructure(moods) {
      for (const mood of moods) {
        if (STRUCTURE_PRESETS[mood]) return STRUCTURE_PRESETS[mood];
      }
      return STRUCTURE_PRESETS.default;
    }

    function scoreIngredient(name, storeObj) {
      const profile = getIngredientProfile(name);
      let score = profile.weight || 1;

      if (!matchesTemp(profile, storeObj.temp)) score -= 4;
      if (storeObj.time === "晚上" && profile.tags.includes("caffeinated")) score -= 2;
      if (storeObj.time === "早上" && profile.tags.includes("caffeinated")) score += 2;

      storeObj.moods.forEach(mood => {
        const rule = MOOD_RULES[mood];
        if (!rule) return;

        if (rule.preferFamilies && rule.preferFamilies.includes(profile.family)) score += 2;
        if (rule.preferTags) {
          rule.preferTags.forEach(tag => {
            if (profile.tags.includes(tag)) score += 1.5;
          });
        }
        if (rule.avoidTags) {
          rule.avoidTags.forEach(tag => {
            if (profile.tags.includes(tag)) score -= 2;
          });
        }
      });

      return score;
    }

    function weightedPick(items, scoreMap, count, predicate = null) {
      const pool = items
        .filter(item => predicate ? predicate(item) : true)
        .map(item => ({ item, score: Math.max(0.1, scoreMap[item] ?? 1) }));

      const results = [];
      const used = new Set();

      while (results.length < count && pool.length) {
        const available = pool.filter(x => !used.has(x.item));
        if (!available.length) break;

        const total = available.reduce((sum, x) => sum + x.score, 0);
        let r = Math.random() * total;
        let chosen = available[available.length - 1].item;

        for (const entry of available) {
          r -= entry.score;
          if (r <= 0) {
            chosen = entry.item;
            break;
          }
        }

        used.add(chosen);
        results.push(chosen);
      }

      return results;
    }

    function scoreCombination(items, storeObj) {
      const tags = items.flatMap(item => getIngredientProfile(item).tags);
      const families = items.map(item => getIngredientProfile(item).family);
      let score = 0;

      PAIRING_RULES.forEach(rule => {
        const matched = rule.all.every(keyword => tags.includes(keyword) || families.includes(keyword));
        if (matched) score += rule.score;
      });

      if (storeObj.moods.includes("低卡") && items.some(item => ["brown sugar","milk"].includes(item))) score -= 2;
      if (
        storeObj.moods.includes("奶茶店") &&
        items.some(item => getIngredientProfile(item).family === "tea") &&
        items.some(item => ["dairy","milk-alt"].includes(getIngredientProfile(item).family))
      ) score += 3;
      if (storeObj.moods.includes("拍照好看") && items.some(item => ["raspberry","blueberry","matcha","rose tea","sparkling water"].includes(item))) score += 2;
      if (storeObj.moods.includes("不太酸") && items.some(item => getIngredientProfile(item).tags.includes("acidic"))) score -= 3;

      return score;
    }

    function buildStructuredRecipePool(inputIngredients, storeObj, creative) {
      const source = inputIngredients.length
        ? inputIngredients
        : creative
          ? randomPick(CREATIVE_INGREDIENT_POOL, 6, 10)
          : randomPick(CREATIVE_INGREDIENT_POOL, 5, 8);

      const items = [...new Set(source)];
      const scoreMap = Object.fromEntries(items.map(item => [item, scoreIngredient(item, storeObj)]));
      return { items, scoreMap };
    }

    function composeRecipeIngredients(pool, storeObj) {
      const structure = getActiveStructure(storeObj.moods);
      const items = pool.items;
      const scoreMap = pool.scoreMap;

      const pickByRole = (role, count) =>
        weightedPick(items, scoreMap, count, item => getIngredientProfile(item).role.includes(role));

      let picked = [
        ...pickByRole("base", structure.base),
        ...pickByRole("body", structure.body),
        ...pickByRole("accent", structure.accent),
        ...pickByRole("sweetener", structure.sweetener),
        ...pickByRole("garnish", structure.garnish)
      ].filter(Boolean);

      picked = [...new Set(picked)];

      if (picked.length < 3) {
        const fillers = weightedPick(items, scoreMap, 4, item => !picked.includes(item));
        picked = [...new Set([...picked, ...fillers])];
      }

      const comboScore = scoreCombination(picked, storeObj);
      if (comboScore < 0) {
        const safer = picked.filter(item =>
          !getIngredientProfile(item).tags.includes("acidic") ||
          !picked.some(x => getIngredientProfile(x).family === "coffee")
        );
        if (safer.length >= 3) picked = safer;
      }

      return picked;
    }

    function splitIngredients(items) {
      const garnishKeywords = [
        "kumquat","金橘","mint","薄荷","lemon","柠檬","lime","青柠","orange","橙",
        "berry","莓","fruit","果","salt","盐","syrup","糖浆","honey","蜂蜜","monk",
        "sugar","糖","collagen","chia","boba","珍珠"
      ];
      const garnishes = [];
      const mains = [];

      items.forEach(item => {
        const lower = item.toLowerCase();
        if (garnishKeywords.some(keyword => lower.includes(keyword))) garnishes.push(item);
        else mains.push(item);
      });

      return { mains: mains.length ? mains : items, garnishes };
    }

    function chooseAmount(ingredient) {
      const lower = ingredient.toLowerCase();
      const profile = getIngredientProfile(ingredient);

      if (lower.includes("espresso")) return "30ml";
      if (lower.includes("cold brew") || lower.includes("coldbrew")) return "120–180ml";
      if (lower.includes("milk") || lower.includes("奶")) return profile.tags.includes("rich") ? "90–130ml" : "100–150ml";
      if (lower.includes("tea") || lower.includes("茶")) return "120–180ml";
      if (lower.includes("matcha")) return "2–3g";
      if (lower.includes("collagen")) return "1 serving (约5–10g)";
      if (
        lower.includes("raspberry") || lower.includes("blueberry") || lower.includes("lychee") ||
        lower.includes("fruit") || lower.includes("莓") || lower.includes("梨") ||
        lower.includes("kumquat") || lower.includes("金橘")
      ) return profile.tags.includes("acidic") ? "8–18g（约2–5颗/片）" : "12–30g（约3–8颗/块）";
      if (
        lower.includes("honey") || lower.includes("sugar") || lower.includes("monk") ||
        lower.includes("syrup") || lower.includes("糖")
      ) return profile.tags.includes("low-cal") ? "3–6ml（约1 tsp）" : "5–12ml（约1–2.5 tsp）";
      if (lower.includes("sparkling")) return "100–150ml";
      if (lower.includes("ice")) return "120–180g（约1杯）";
      if (profile.role.includes("garnish")) return "1–2 tsp / 少量点缀";
      return "10–50ml（按结构微调）";
    }

    function makeRecipe(name, style, picked, moodHints, temp, time) {
      const { mains, garnishes } = splitIngredients(picked);
      const ingredients = [
        ...mains.map(item => `${item} ${chooseAmount(item)}`),
        ...garnishes.map(item => `${item} ${chooseAmount(item)}`)
      ];

      const profiles = picked.map(item => getIngredientProfile(item));
      const hasLayer = moodHints.includes("拍照好看");
      const hotDrink = temp === "热";
      const hasTea = profiles.some(p => p.family === "tea");
      const hasCoffee = profiles.some(p => p.family === "coffee");
      const hasCreamy = profiles.some(p => p.tags.includes("creamy"));
      const hasBubbly = profiles.some(p => p.tags.includes("bubbly"));
      const hasFloral = profiles.some(p => p.tags.includes("floral"));
      const hasAcidic = profiles.some(p => p.tags.includes("acidic"));

      const timeHint =
        time === "早上" ? "整体会更提神、收得更干净。"
        : time === "晚上" ? "甜度和刺激感会压低一点，更轻松。"
        : "";

      let method = "按 base → body → accent → sweetener → garnish 的顺序组合，边试边微调。";
      if (hasTea && hasCreamy) method = hotDrink ? "先泡好茶底，再加入奶体与甜味，最后补花香或果香点缀。" : "先做茶底，杯中加冰与奶体，再沿杯壁倒入茶底和风味层。";
      if (hasCoffee && hasCreamy) method = hotDrink ? "先萃咖啡，再与奶体结合，甜味后加，避免太腻。" : "先加冰与奶体，再缓缓倒入咖啡，最后补风味材料。";
      if (hasBubbly) method = "先做浓一点的主底，再加冰，最后补气泡水，避免气泡先散掉。";
      if (hasFloral && hasCreamy) method += " 花香只要轻轻托住，不要压过主体。";
      if (hasAcidic && hasCreamy) method += " 酸感果料要控量，别让奶感发尖。";
      if (hasLayer) method += " 想更好看就把颜色深的部分最后沿杯壁慢慢倒入。";

      return {
        name,
        style,
        calories: picked.some(x => x.toLowerCase().includes("half"))
          ? "约 140–220 kcal"
          : moodHints.includes("低卡")
            ? "约 50–120 kcal"
            : hasCreamy && picked.some(x => ["brown sugar","honey"].includes(x))
              ? "约 110–190 kcal"
              : "约 80–160 kcal",
        ingredients,
        steps: `${method}${garnishes.length ? ` 最后用 ${garnishes.join("、")} 收尾或点缀。` : ""}${timeHint}`
      };
    }

    function renderResults() {
      if (!store.recipes.length) {
        els.resultsBlock.style.display = "none";
        els.cards.innerHTML = "";
        return;
      }
      els.resultsBlock.style.display = "block";
      els.cards.innerHTML = "";

      store.recipes.forEach((recipe, idx) => {
        const recipeId = recipe.id || `${recipe.name}-${idx}`;
        const card = document.createElement("div");
        card.className = "card";

        const top = document.createElement("div");
        top.className = "card-top";

        const left = document.createElement("div");
        left.innerHTML = `
          <div class="card-title">${escapeHtml(recipe.name)}</div>
          <div class="card-style">${escapeHtml(recipe.style)}</div>
        `;

        const cal = document.createElement("div");
        cal.className = "cal";
        cal.textContent = recipe.calories;

        top.appendChild(left);
        top.appendChild(cal);

        const ing = document.createElement("div");
        ing.innerHTML = `<div class="section-title">材料</div>`;
        const ul = document.createElement("ul");
        recipe.ingredients.forEach(item => {
          const li = document.createElement("li");
          li.textContent = item;
          ul.appendChild(li);
        });
        ing.appendChild(ul);

        const steps = document.createElement("div");
        steps.innerHTML = `<div class="section-title">做法</div><div class="steps">${escapeHtml(recipe.steps)}</div>`;

        const fb = document.createElement("div");
        fb.className = "feedback";
        [["喜欢","like"],["不喜欢","dislike"],["想做","want"]].forEach(([label, value]) => {
          const btn = document.createElement("button");
          btn.className = "fb-btn" + (store.feedback[recipeId] === value ? " active" : "");
          btn.type = "button";
          btn.textContent = label;
          btn.onclick = () => {
            store.feedback[recipeId] = store.feedback[recipeId] === value ? null : value;
            saveLocal();
            renderResults();
          };
          fb.appendChild(btn);
        });

        card.appendChild(top);
        card.appendChild(ing);
        card.appendChild(steps);
        card.appendChild(fb);
        els.cards.appendChild(card);
      });
    }

    function renderStatus() {
      els.statusText.textContent = store.ingredients.length
        ? `当前食材 ${store.ingredients.length} 个 · 版本 ${store.seed}`
        : `未指定食材也可以生成 · 版本 ${store.seed}`;
    }

    function renderAll() {
      renderPresetButtons(els.moodPresets, PRESET_MOODS, store.moods);
      renderPresetButtons(els.toolPresets, PRESET_TOOLS, store.tools);
      renderActiveTags(els.activeIngredients, store.ingredients);
      renderActiveTags(els.activeMoods, store.moods);
      renderActiveTags(els.activeTools, store.tools);
      renderSavedIngredients();
      renderStatus();
      renderResults();
    }

    function generateRecipes(storeObj, more = false, creative = false) {
      const pool = buildStructuredRecipePool(storeObj.ingredients, storeObj, creative);
      if (!pool.items.length) return [];

      const count = more ? 5 : 3;
      const names = ["清爽系特调","轻甜果饮","平衡奶感","茶感气泡","实验款","意外好喝","晨间提神","晚间轻饮"];
      const styles = [
        storeObj.moods.includes("清爽") ? "清爽轻盈" : "日常顺口",
        storeObj.moods.includes("奶茶店") ? "奶茶店灵感" : creative ? "自由发挥" : "家庭特调",
        storeObj.moods.includes("甜品感") ? "甜品向" : "轻甜平衡",
        storeObj.moods.includes("花香") ? "花香路线" : storeObj.moods.includes("果香") ? "果香路线" : "混合风味",
        storeObj.moods.includes("拍照好看") ? "适合分层" : creative ? "有点新鲜" : "简单耐喝"
      ];

      const recipes = [];
      let tries = 0;

      while (recipes.length < count && tries < count * 5) {
        tries += 1;
        const picked = composeRecipeIngredients(pool, storeObj);
        const comboKey = picked.slice().sort().join("|");
        if (recipes.some(r => r.comboKey === comboKey)) continue;

        const recipe = makeRecipe(names[recipes.length], styles[recipes.length % styles.length], picked, storeObj.moods, storeObj.temp, storeObj.time);
        recipes.push({
          ...recipe,
          comboKey,
          id: `${names[recipes.length]}-${recipes.length}-${picked.join("-")}`
        });
      }

      return recipes.map(({ comboKey, ...rest }) => rest);
    }

    function bindTagInput(inputEl, targetList, saveToSaved = false) {
      inputEl.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          const val = inputEl.value.trim();
          if (!val) return;
          uniquePush(targetList, val);
          if (saveToSaved) {
            uniquePush(store.savedIngredients, val);
            saveLocal();
          }
          inputEl.value = "";
          renderAll();
        }
      });
    }

    function init() {
      loadLocal();
      populateSelect(els.timeSelect, TIME_OPTIONS);
      populateSelect(els.tempSelect, TEMP_OPTIONS);

      els.timeSelect.addEventListener("change", e => {
        store.time = e.target.value;
      });
      els.tempSelect.addEventListener("change", e => {
        store.temp = e.target.value;
      });

      bindTagInput(els.ingredientInput, store.ingredients, true);
      bindTagInput(els.moodInput, store.moods, false);
      bindTagInput(els.toolInput, store.tools, false);

      els.generateBtn.onclick = () => {
        store.seed += 1;
        store.recipes = generateRecipes(store, false, false);
        renderAll();
      };
      els.moreBtn.onclick = () => {
        store.seed += 1;
        store.recipes = generateRecipes(store, true, false);
        renderAll();
      };
      els.creativeBtn.onclick = () => {
        store.seed += 1;
        store.recipes = generateRecipes(store, true, true);
        renderAll();
      };

      renderAll();
    }

    init();
  </script>
</body>
